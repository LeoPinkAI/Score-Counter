<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScoreCounter</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* 滿版安全防崩塌容器 */
        .app-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            background-color: #000000;
            overflow: hidden;
        }

        /* 頂部黃色導航列：改用三欄網格，確保標題完美置中 */
        .header {
            background-color: #FFCC00;
            color: #000000;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 55px;
            padding: 0 20px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .header .title {
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            text-align: center;
        }
        .header .right-box {
            display: flex;
            justify-content: flex-end;
        }

        /* 黑黃極簡風 重置按鈕 */
        .reset-btn {
            background-color: #000000;
            color: #FFCC00;
            border: none;
            padding: 6px 14px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s;
            outline: none;
        }
        .reset-btn:active {
            transform: scale(0.95);
        }

        /* 主計分板區域 */
        .scoreboard {
            flex: 1;
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            background-color: #000000;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
        }

        /* 每個玩家的獨立直欄 */
        .player-column {
            flex: 1;
            min-width: 85px;
            display: flex;
            flex-direction: column;
            height: 100%; 
            border-right: 1px solid #1A1A1A;
            min-height: 0; 
        }
        .player-column:last-child {
            border-right: none;
        }

        /* 玩家名字 */
        .player-name {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: #FFCC00;
            border-bottom: 1px solid #1A1A1A;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* 歷史分數紀錄區 */
        .history-area {
            flex: 1;
            overflow-y: auto;
            min-height: 0; 
            padding: 10px 0;
            display: flex;
            flex-direction: column;
        }

        /* 每輪得分與小計 */
        .score-row {
            text-align: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .score-change {
            font-size: 0.95rem;
            color: #E0E0E0;
            margin-bottom: 2px;
        }
        .score-subtotal {
            font-size: 0.95rem;
            color: #888888;
        }

        /* 總分顯示格 */
        .total-box {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFFFFF;
            border-top: 1px solid #1A1A1A;
            border-bottom: 1px solid #1A1A1A;
            background-color: #0A0A0A;
            flex-shrink: 0;
        }

        /* 底部控制按鈕區 */
        .control-panel {
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #000000;
            flex-shrink: 0;
        }
        .action-btns {
            display: flex;
            gap: 10px;
        }

        /* 圓形按鈕通用樣式 */
        .btn {
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            outline: none;
        }
        .btn:active {
            transform: scale(0.9);
        }
        .btn-plus {
            width: 32px;
            height: 32px;
            background-color: #2ECC71;
            font-size: 1.2rem;
        }
        .btn-minus {
            width: 32px;
            height: 32px;
            background-color: #E74C3C;
            font-size: 1.2rem;
        }
        .btn-trash {
            width: 36px;
            height: 36px;
            background-color: #D35400;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div></div> <div class="title">ScoreCounter</div>
            <div class="right-box">
                <button class="reset-btn" onclick="resetAll()">重置</button>
            </div>
        </div>

        <div class="scoreboard" id="scoreboard"></div>
    </div>

    <script>
        // 初始狀態
        var players = [
            { name: '玩家 1', history: [] },
            { name: '玩家 2', history: [] },
            { name: '玩家 3', history: [] },
            { name: '玩家 4', history: [] }
        ];

        // 渲染介面
        function renderScoreboard() {
            var container = document.getElementById('scoreboard');
            if (!container) return;
            container.innerHTML = '';

            players.forEach(function(player, pIndex) {
                var column = document.createElement('div');
                column.className = 'player-column';

                // 1. 玩家名字
                var nameDiv = document.createElement('div');
                nameDiv.className = 'player-name';
                nameDiv.innerText = player.name;
                nameDiv.onclick = function() { editName(pIndex); };
                column.appendChild(nameDiv);

                // 2. 歷史紀錄區
                var historyArea = document.createElement('div');
                historyArea.className = 'history-area';
                
                var runningTotal = 0;
                player.history.forEach(function(score) {
                    runningTotal += score;
                    
                    var row = document.createElement('div');
                    row.className = 'score-row';
                    
                    var change = document.createElement('div');
                    change.className = 'score-change';
                    change.innerText = (score >= 0 ? '+' : '') + score;
                    
                    var subtotal = document.createElement('div');
                    subtotal.className = 'score-subtotal';
                    subtotal.innerText = '= ' + runningTotal;
                    
                    row.appendChild(change);
                    row.appendChild(subtotal);
                    historyArea.appendChild(row);
                });
                column.appendChild(historyArea);

                // 自動捲動
                setTimeout(function() { historyArea.scrollTop = historyArea.scrollHeight; }, 50);

                // 3. 總分顯示
                var totalBox = document.createElement('div');
                totalBox.className = 'total-box';
                totalBox.innerText = runningTotal;
                column.appendChild(totalBox);

                // 4. 底部控制區
                var controlPanel = document.createElement('div');
                controlPanel.className = 'control-panel';

                var actionBtns = document.createElement('div');
                actionBtns.className = 'action-btns';

                var plusBtn = document.createElement('button');
                plusBtn.className = 'btn btn-plus';
                plusBtn.innerText = '+';
                plusBtn.onclick = function() { modifyScore(pIndex, true); };

                var minusBtn = document.createElement('button');
                minusBtn.className = 'btn btn-minus';
                minusBtn.innerText = '-';
                minusBtn.onclick = function() { modifyScore(pIndex, false); };

                actionBtns.appendChild(plusBtn);
                actionBtns.appendChild(minusBtn);
                controlPanel.appendChild(actionBtns);

                var trashBtn = document.createElement('button');
                trashBtn.className = 'btn btn-trash';
                trashBtn.innerText = '🗑️';
                trashBtn.onclick = function() { deleteLastScore(pIndex); };
                controlPanel.appendChild(trashBtn);

                column.appendChild(controlPanel);
                container.appendChild(column);
            });
        }

        // 計分邏輯
        function modifyScore(index, isPositive) {
            var actionText = isPositive ? "增加" : "減少";
            var valStr = prompt("請輸入要為 " + players[index].name + " " + actionText + " 的分數:", "");
            if (valStr === null || valStr.trim() === "") return;
            
            var val = parseInt(valStr, 10);
            if (isNaN(val) || val < 0) {
                alert("請輸入有效的正整數！");
                return;
            }

            var finalScore = isPositive ? val : -val;
            players[index].history.push(finalScore);
            renderScoreboard();
        }

        // 刪除最後一筆
        function deleteLastScore(index) {
            if (players[index].history.length === 0) {
                alert(players[index].name + " 目前沒有任何分數紀錄。");
                return;
            }
            if (confirm("確定要刪除 " + players[index].name + " 的最後一筆得分紀錄嗎？")) {
                players[index].history.pop();
                renderScoreboard();
            }
        }

        // 改名字
        function editName(index) {
            var isDefault = players[index].name.indexOf('玩家') !== -1;
            var newName = prompt("請輸入該玩家的名字:", isDefault ? '' : players[index].name);
            if (newName && newName.trim() !== "") {
                players[index].name = newName.trim();
                renderScoreboard();
            }
        }

        // 全域重置按鍵功能
        function resetAll() {
            if (confirm("確定要重置計分板嗎？\n所有玩家的名字與分數將會全部清空還原。")) {
                players = [
                    { name: '玩家 1', history: [] },
                    { name: '玩家 2', history: [] },
                    { name: '玩家 3', history: [] },
                    { name: '玩家 4', history: [] }
                ];
                renderScoreboard();
            }
        }

        // 頁面安全載入啟動
        window.onload = function() {
            renderScoreboard();
        };
    </script>
</body>
</html>
