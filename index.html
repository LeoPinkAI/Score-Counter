<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScoreCounter</title>
    <style>
        /* 色彩變數 (白底黑字) */
        :root {
            --bg-main: #F4F4F6;       
            --bg-card: #FFFFFF;       
            --text-main: #1A1A1A;     
            --text-sub: #7F8C8D;      
            --name-bg: #1A1A1A;       
            --name-text: #FFFFFF;     
            --border-dash: #E2E8F0;   
            --btn-border: #CBD5E1;    
            --header-bg: #FFFFFF;     
        }

        /* 色彩變數 (黑底白字) */
        .dark-theme {
            --bg-main: #121212;
            --bg-card: #1A1A1A;
            --text-main: #FFFFFF;
            --text-sub: #A0AEC0;
            --name-bg: #FFFFFF;
            --name-text: #1A1A1A;
            --border-dash: #4A5568;
            --btn-border: #4A5568;
            --header-bg: #1A1A1A;
        }

        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-main); 
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            transition: background-color 0.2s, color 0.2s;
        }

        .app-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 頂部導航列 */
        .header {
            background-color: var(--header-bg);
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            padding: 0 15px;
            border-bottom: 2px solid var(--text-main);
            flex-shrink: 0;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .header .title {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header .right-box {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }

        /* 頂部功能按鈕通用樣式 */
        .header-btn {
            border: none;
            height: 32px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s, color 0.2s;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-btn:active {
            transform: scale(0.95);
        }

        /* 極簡黑白切換小方塊 */
        .invert-btn {
            width: 32px; /* 縮成正方形 */
            background-color: #718096;
            color: #FFFFFF;
        }
        
        /* 重置按鈕 */
        .reset-btn {
            padding: 0 14px;
            background-color: #4A5568;
            color: #FFFFFF;
        }

        /* 主計分板區域 */
        .scoreboard {
            flex: 1;
            display: flex;
            gap: 8px;
            padding: 12px 8px;
            overflow-x: auto;
            overflow-y: hidden;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
        }

        /* 每個玩家獨立卡牌 */
        .player-column {
            flex: 1;
            min-width: 85px;
            display: flex;
            flex-direction: column;
            height: 100%; 
            background-color: var(--bg-card);
            border: 2px solid var(--text-main);
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            overflow: hidden;
            min-height: 0; 
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* 玩家名字 */
        .player-name {
            height: 40px;
            background-color: var(--name-bg);
            color: var(--name-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            flex-shrink: 0;
            transition: background-color 0.2s, color 0.2s;
        }

        /* 歷史分數紀錄區 */
        .history-area {
            flex: 1;
            overflow-y: auto;
            min-height: 0; 
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-card);
            transition: background-color 0.2s;
        }

        /* 每輪得分與小計 */
        .score-row {
            text-align: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .score-change {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 1px;
            transition: color 0.2s;
        }
        .score-subtotal {
            font-size: 0.85rem;
            color: var(--text-sub);
            transition: color 0.2s;
        }

        /* 總分顯示格 */
        .total-box {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-main);
            border-top: 2px dashed var(--border-dash);
            background-color: var(--bg-card);
            flex-shrink: 0;
            transition: all 0.2s;
        }

        /* 底部控制按鈕區 */
        .control-panel {
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--bg-card);
            padding-bottom: 5px;
            flex-shrink: 0;
            transition: background-color 0.2s;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }

        /* 方塊按鈕 */
        .btn {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1.5px solid var(--btn-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            outline: none;
        }
        .btn:active {
            transform: scale(0.9);
            opacity: 0.8;
        }
        .btn-plus {
            width: 32px;
            height: 32px;
            font-size: 1.1rem;
        }
        .btn-minus {
            width: 32px;
            height: 32px;
            font-size: 1.1rem;
        }
        
        /* 刪除按鈕 */
        .btn-trash {
            width: 72px;
            height: 26px;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-sub);
            border: 1px solid var(--border-dash);
            background-color: var(--bg-card);
            border-radius: 4px;
            transition: all 0.2s;
        }
        .btn-trash:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="title">ScoreCounter</div>
            <div class="right-box">
                <button id="theme-btn" class="header-btn invert-btn" onclick="toggleTheme()">黑</button>
                <button class="header-btn reset-btn" onclick="resetAll()">重置</button>
            </div>
        </div>

        <div class="scoreboard" id="scoreboard"></div>
    </div>

    <script>
        var players = [
            { name: '玩家 1', history: [] },
            { name: '玩家 2', history: [] },
            { name: '玩家 3', history: [] },
            { name: '玩家 4', history: [] }
        ];

        // 智能黑白文字切換邏輯
        function toggleTheme() {
            var hasDark = document.body.classList.toggle('dark-theme');
            // 如果當前變成了黑底 (dark-theme)，文字就顯示「白」；否則顯示「黑」
            document.getElementById('theme-btn').innerText = hasDark ? '白' : '黑';
        }

        // 渲染介面
        function renderScoreboard() {
            var container = document.getElementById('scoreboard');
            if (!container) return;
            container.innerHTML = '';

            players.forEach(function(player, pIndex) {
                var column = document.createElement('div');
                column.className = 'player-column';

                // 1. 玩家名字
                var nameDiv = document.createElement('div');
                nameDiv.className = 'player-name';
                nameDiv.innerText = player.name;
                nameDiv.onclick = function() { editName(pIndex); };
                column.appendChild(nameDiv);

                // 2. 歷史紀錄區
                var historyArea = document.createElement('div');
                historyArea.className = 'history-area';
                
                var runningTotal = 0;
                player.history.forEach(function(score) {
                    runningTotal += score;
                    
                    var row = document.createElement('div');
                    row.className = 'score-row';
                    
                    var change = document.createElement('div');
                    change.className = 'score-change';
                    change.innerText = (score >= 0 ? '+' : '') + score;
                    
                    var subtotal = document.createElement('div');
                    subtotal.className = 'score-subtotal';
                    subtotal.innerText = '= ' + runningTotal;
                    
                    row.appendChild(change);
                    row.appendChild(subtotal);
                    historyArea.appendChild(row);
                });
                column.appendChild(historyArea);

                // 自動捲動
                setTimeout(function() { historyArea.scrollTop = historyArea.scrollHeight; }, 50);

                // 3. 總分顯示
                var totalBox = document.createElement('div');
                totalBox.className = 'total-box';
                totalBox.innerText = runningTotal;
                column.appendChild(totalBox);

                // 4. 底部按鈕區
                var controlPanel = document.createElement('div');
                controlPanel.className = 'control-panel';

                var actionBtns = document.createElement('div');
                actionBtns.className = 'action-btns';

                var plusBtn = document.createElement('button');
                plusBtn.className = 'btn btn-plus';
                plusBtn.innerText = '+';
                plusBtn.onclick = function() { modifyScore(pIndex, true); };

                var minusBtn = document.createElement('button');
                minusBtn.className = 'btn btn-minus';
                minusBtn.innerText = '-';
                minusBtn.onclick = function() { modifyScore(pIndex, false); };

                actionBtns.appendChild(plusBtn);
                actionBtns.appendChild(minusBtn);
                controlPanel.appendChild(actionBtns);

                var trashBtn = document.createElement('button');
                trashBtn.className = 'btn btn-trash';
                trashBtn.innerText = '刪除';
                trashBtn.onclick = function() { deleteLastScore(pIndex); };
                controlPanel.appendChild(trashBtn);

                column.appendChild(controlPanel);
                container.appendChild(column);
            });
        }

        // 計分邏輯
        function modifyScore(index, isPositive) {
            var actionText = isPositive ? "增加" : "減少";
            var valStr = prompt("請輸入要為 " + players[index].name + " " + actionText + " 的分數:", "");
            if (valStr === null || valStr.trim() === "") return;
            
            var val = parseInt(valStr, 10);
            if (isNaN(val) || val < 0) {
                alert("請輸入有效的正整數！");
                return;
            }

            var finalScore = isPositive ? val : -val;
            players[index].history.push(finalScore);
            renderScoreboard();
        }

        // 刪除最後一筆
        function deleteLastScore(index) {
            if (players[index].history.length === 0) {
                alert(players[index].name + " 目前沒有任何分數紀錄。");
                return;
            }
            if (confirm("確定要刪除 " + players[index].name + " 的最後一筆得分紀錄嗎？")) {
                players[index].history.pop();
                renderScoreboard();
            }
        }

        // 改名字
        function editName(index) {
            var isDefault = players[index].name.indexOf('玩家') !== -1;
            var newName = prompt("請輸入該玩家的名字:", isDefault ? '' : players[index].name);
            if (newName && newName.trim() !== "") {
                players[index].name = newName.trim();
                renderScoreboard();
            }
        }

        // 全域重置
        function resetAll() {
            if (confirm("確定要重置計分板嗎？\n所有玩家的名字與分數將會全部清空還原。")) {
                players = [
                    { name: '玩家 1', history: [] },
                    { name: '玩家 2', history: [] },
                    { name: '玩家 3', history: [] },
                    { name: '玩家 4', history: [] }
                ];
                renderScoreboard();
            }
        }

        window.onload = function() {
            renderScoreboard();
        };
    </script>
</body>
</html>
